name: Publish to npm with version tagging (OIDC)

on:
  push:
    tags:
      - 'v*'
    branches:
      - 'main'

  workflow_dispatch:

jobs:
  publish-official:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          scope: '@mariocp'
      
      - name: Install dependencies
        run: npm install
      
      - name: Validate version tag
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          if [[ ! $VERSION =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: Tag must be in format v1.2.3"
            exit 1
          fi
          echo "Creating official release: $VERSION"

      - name: Run tests
        run: npm test

      - name: Clear auth token for OIDC
        run: echo "NODE_AUTH_TOKEN=" >> $GITHUB_ENV
      

      - name: Publish to npm using OIDC
        run: npm publish --access public --provenance
      
      - name: Create GitHub Release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          release_name: ${{ github.ref_name }}
          body: |
            ## Changes
            
            Full changelog available at:
            https://github.com/cp-mario/SHTC/blob/${{ github.ref_name }}/CHANGELOG.md
            
            ### Automated Changes
            - Built and published with GitHub Actions
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-experimental:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          scope: '@mariocp'
      
      - name: Install dependencies
        run: npm install
      
      - name: Get current commit info and latest npm version
        id: commit_info
        run: |
          COMMIT_COUNT=$(git rev-list --count HEAD)
          COMMIT_DATE=$(date -u +%Y-%m-%d-%H-%M-%S)
          # Get latest version from npm registry
          LATEST_VERSION=$(npm view @mariocp/shtc version 2>/dev/null || echo "0.0.0")
          echo "commit_count=$COMMIT_COUNT" >> $GITHUB_OUTPUT
          echo "commit_date=$COMMIT_DATE" >> $GITHUB_OUTPUT
          echo "latest_version=$LATEST_VERSION" >> $GITHUB_OUTPUT
          echo "Latest version from npm: $LATEST_VERSION"
      
      - name: Calculate experimental version (latest npm + patch increment)
        id: exp_version
        run: |
          LATEST_VERSION="${{ steps.commit_info.outputs.latest_version }}"
          # Parse major.minor.patch from latest version
          IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST_VERSION"
          # Experimental version = latest version with patch + 1
          EXPERIMENTAL_PATCH=$((PATCH + 1))
          EXPERIMENTAL_VERSION="${MAJOR}.${MINOR}.${EXPERIMENTAL_PATCH}"
          echo "experimental_version=$EXPERIMENTAL_VERSION" >> $GITHUB_OUTPUT
          echo "Calculated experimental version: $EXPERIMENTAL_VERSION (from npm latest: $LATEST_VERSION)"
      
      - name: Update package.json for experimental version
        run: |
          EXPERIMENTAL_VERSION="${{ steps.exp_version.outputs.experimental_version }}"
          echo "Updating package.json to version $EXPERIMENTAL_VERSION"
          jq --arg version "$EXPERIMENTAL_VERSION" '.version = $version' package.json > package.json.tmp && mv package.json.tmp package.json
      
      - name: Run tests
        run: npm test
      
      - name: Build package
        run: npm run build

      - name: Clear auth token for OIDC
        run: echo "NODE_AUTH_TOKEN=" >> $GITHUB_ENV
      
      - name: Publish experimental version using OIDC
        run: npm publish --access public --tag experimental --provenance
      
      - name: Create experimental release
        uses: actions/create-release@v1
        with:
          tag_name: experimental-${{ steps.exp_version.outputs.experimental_version }}-${{ steps.commit_info.outputs.commit_count }}-${{ steps.commit_info.outputs.commit_date }}
          release_name: experimental-${{ steps.exp_version.outputs.experimental_version }}-${{ steps.commit_info.outputs.commit_count }}-${{ steps.commit_info.outputs.commit_date }}
          body: |
            ## Experimental Version
            
            This is an experimental build created automatically from commit #${{ steps.commit_info.outputs.commit_count }} on ${{ steps.commit_info.outputs.commit_date }}.
            
            ### Version Info
            - Latest npm version: ${{ steps.commit_info.outputs.latest_version }}
            - Experimental version: ${{ steps.exp_version.outputs.experimental_version }}
            - Commit: #${{ steps.commit_info.outputs.commit_count }}
            - Date: ${{ steps.commit_info.outputs.commit_date }}
            
            ### Usage
            Install with: \`npm install @mariocp/shtc@experimental\`
            
            ### Important Notes
            - Experimental versions may contain bugs
            - Not intended for production use
            - Version follows: official_version.patch+1
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Reset package.json version
        run: git checkout -- package.json

  cleanup:
    runs-on: ubuntu-latest
    if: always()
    needs: [publish-official, publish-experimental]
    
    steps:
      - name: Cleanup workflow run logs
        run: |
          echo "Workflow completed successfully"
          echo "Official releases created for tagged versions"
          echo "Experimental versions created for each main branch commit"
